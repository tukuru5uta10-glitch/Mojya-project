<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pwnk — Osaka</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Noto+Sans+JP:wght@100;300;400;500&display=swap');

:root {
  --cream: #F5F0E8;
  --teak: #8B6A47;
  --teak-light: #C4A882;
  --charcoal: #2C2C2C;
  --warm-white: #FAF7F2;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:var(--cream);
  color:var(--charcoal);
  font-family:'Noto Sans JP', sans-serif;
  font-weight:400;
  overflow-x:hidden;
  line-height:1.6;
}

/* ── HEADER ── */
header {
  position:fixed; top:0; left:0; width:100%; height:80px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 5%; z-index:100;
}
.logo { font-family:'Cormorant Garamond', serif; font-size:1.2rem; letter-spacing:0.2em; font-weight:300; }

/* ── HERO ── */
.hero {
  position:relative; width:100%; height:100vh;
  display:flex; flex-direction:column; justify-content:center;
  padding:0 10%; overflow:hidden;
  background: linear-gradient(to bottom, #948b7d 0%, #6e6456 100%);
  color: #fff;
}
.hero h1 {
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(4rem, 12vw, 9rem);
  font-weight:300; line-height:1.1; letter-spacing:-0.02em;
}

/* ── ABOUT (背景維持) ── */
#about {
  position:relative; padding:160px 0;
  background-image: url('鏝⑥.png');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #fff;
  min-height: 80vh;
  display: flex;
  align-items: center;
}
#about::before {
  content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.45); z-index: 1;
}
.about-inner { position: relative; z-index: 2; padding: 0 10%; width: 100%; }
#aboutLabel { opacity:0; letter-spacing:0.5em; font-size:0.7rem; margin-bottom:40px; }
#aboutStatement { opacity:0; font-size:clamp(1.8rem, 4vw, 2.8rem); font-weight:300; line-height:1.8; letter-spacing:0.15em; }

/* ── WORK GRID ── */
#work { padding:120px 0; background:var(--cream); }
.section-label { text-align:center; letter-spacing:0.5em; font-size:0.7rem; margin-bottom:80px; color:var(--teak); }
.work-grid {
  display:grid; grid-template-columns: repeat(2, 1fr);
  gap: 80px 40px; padding:0 10%; max-width:1400px; margin:0 auto;
}

.tex-cell { opacity:0; transform:translateY(30px); }

/* MORTEX：サイズ維持(横幅いっぱい) */
.mortex-box { grid-column: 1 / -1; width: 100%; margin-bottom: 20px; }
.mortex-box img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }

/* 漆喰・造形・素材：サイズ調整(85%に絞る) */
.sub-box { width: 85%; margin: 0 auto; }
.sub-box img { width: 100%; aspect-ratio: 4/5; object-fit: cover; }

.work-image-wrap { overflow:hidden; position:relative; }
.work-image-wrap img { width:100%; display:block; transition:transform 0.8s cubic-bezier(0.16,1,0.3,1); }
.work-image-wrap:hover img { transform:scale(1.05); }
.work-caption { margin-top:15px; font-size:0.75rem; letter-spacing:0.2em; color:var(--teak); font-weight:300; }

/* ── PROFILE (サイズ調整) ── */
#profile { padding:140px 10%; background:var(--warm-white); }
.profile-container { display:flex; gap:80px; align-items:center; max-width:1100px; margin:0 auto; }

/* プロフィール写真：サイズ制限 */
.profile-visual { width: 300px; flex-shrink:0; position:relative; opacity:0; }
.profile-visual img { width: 100%; border-radius: 2px; }

.profile-text { flex:1; }
#profileLabel { opacity:0; letter-spacing:0.4em; font-size:0.7rem; color:var(--teak); margin-bottom:20px; }
#profileName  { opacity:0; font-size:2.4rem; font-weight:300; margin-bottom:10px; letter-spacing:0.1em; }
#profileTitleJp { opacity:0; color:var(--teak-light); font-size:0.85rem; margin-bottom:30px; letter-spacing:0.05em; }
#profileBio   { opacity:0; font-weight:300; font-size:0.95rem; line-height:2; opacity:0.8; }

/* ── FOOTER ── */
footer { padding:100px 10% 40px; background:var(--cream); text-align:center; border-top:1px solid rgba(0,0,0,0.05); }
.copyright { font-size:0.65rem; letter-spacing:0.1em; opacity:0.4; }

@media (max-width: 768px) {
  .work-grid { grid-template-columns: 1fr; gap: 60px; }
  .sub-box { width: 100%; }
  .profile-container { flex-direction: column; text-align: center; gap: 40px; }
  .profile-visual { width: 220px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">pwnk — Osaka</div>
</header>

<section class="hero">
  <div style="font-size:0.7rem; letter-spacing:0.5em; margin-bottom:20px; opacity:0.7;">MOJYA PROJECT</div>
  <h1>刻まれる<br>光。</h1>
</section>

<section id="about">
  <div class="about-inner">
    <div id="aboutLabel">ABOUT</div>
    <h2 id="aboutStatement">語る壁に応える鏝。</h2>
  </div>
</section>

<section id="work">
  <div class="section-label">WORKS</div>
  <div class="work-grid">
    <div class="tex-cell mortex-box">
      <div class="work-image-wrap">
        <img src="モールテックス.png" alt="MORTEX">
      </div>
      <div class="work-caption">MORTEX</div>
    </div>
    <div class="tex-cell sub-box">
      <div class="work-image-wrap">
        <img src="漆喰.png" alt="漆喰">
      </div>
      <div class="work-caption">漆喰</div>
    </div>
    <div class="tex-cell sub-box">
      <div class="work-image-wrap">
        <img src="造形.png" alt="造形">
      </div>
      <div class="work-caption">造形</div>
    </div>
    <div class="tex-cell sub-box">
      <div class="work-image-wrap">
        <img src="素材.png" alt="素材">
      </div>
      <div class="work-caption">素材</div>
    </div>
  </div>
</section>

<section id="profile">
  <div class="profile-container">
    <div id="profileVisual" class="profile-visual">
      <img src="プロフィール.JPG" alt="Profile">
    </div>
    <div class="profile-text">
      <div id="profileLabel">PROFILE</div>
      <h3 id="profileName">もじゃ</h3>
      <p id="profileTitleJp">First-Class Building Construction Management Engineer</p>
      <p id="profileBio">
        29年の経験を持つ建築施工管理技士。木造住宅、3Dビジュアライゼーション、そして左官。技術と感性が交差する場所で、新しい空間の価値を創造します。
      </p>
    </div>
  </div>
</section>

<footer>
  <div class="copyright">&copy; 2026 MOJYA PROJECT / pwnk Osaka</div>
</footer>

<script>
gsap.registerPlugin(ScrollTrigger);

// ABOUTのアニメーション
gsap.to('#aboutLabel', { opacity:1, scrollTrigger:{ trigger:'#about', start:'top 75%' }, duration:0.8 });
gsap.to('#aboutStatement', { opacity:1, scrollTrigger:{ trigger:'#about', start:'top 70%' }, duration:1.2, delay:0.3 });

// WORKSのアニメーション
gsap.utils.toArray('.tex-cell').forEach((el, i) => {
  gsap.to(el, { 
    opacity:1, y:0, 
    scrollTrigger:{ trigger:el, start:'top 85%' }, 
    duration:1, ease:'power3.out' 
  });
});

// プロフィールのアニメーション
gsap.to('#profileVisual', { opacity:1, scrollTrigger:{ trigger:'#profile', start:'top 70%' }, duration:1.2 });
['#profileLabel','#profileName','#profileTitleJp','#profileBio'].forEach((id, i) => {
  gsap.to(id, { 
    opacity:1, 
    scrollTrigger:{ trigger:'#profile', start:'top 70%' }, 
    duration:0.8, delay:i*0.2, ease:'power3.out' 
  });
});
</script>

</body>
</html>
