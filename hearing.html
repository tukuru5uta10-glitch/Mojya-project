<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PWNK Hearing</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
:root{
  --cream:#F5F0E8;
  --teak:#8B5E3C;
  --teak-light:#C8A98D;
}

body{
  margin:0;
  background:var(--cream);
  font-family:'Noto Sans JP', sans-serif;
  color:#333;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100svh;
}

/* コンテナ */
.container{
  width:100%;
  max-width:520px;
  padding:40px 20px;
}

/* タイトル */
h2{
  font-family:'Cormorant Garamond', serif;
  font-size:30px;
  font-weight:300;
  margin-bottom:40px;
}

/* カード */
.card{
  border-bottom:1px solid var(--teak-light);
  padding:18px 0;
  cursor:pointer;
  transition:0.4s;
  font-size:17px;
}

.card:hover{
  color:var(--teak);
}

.card.selected{
  color:var(--teak);
  border-bottom:1px solid var(--teak);
}

/* 入力 */
input, textarea{
  width:100%;
  border:none;
  border-bottom:1px solid var(--teak-light);
  background:transparent;
  padding:12px 0;
  font-size:16px;
}

/* ボタン */
button{
  margin-top:40px;
  padding:12px 20px;
  border:1px solid var(--teak);
  background:none;
  color:var(--teak);
  cursor:pointer;
  transition:0.3s;
  width:100%;
}

button:hover{
  background:var(--teak);
  color:#fff;
}

button:disabled{
  opacity:0.3;
  cursor:not-allowed;
}

/* 結果 */
pre{
  white-space:pre-wrap;
  line-height:1.8;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>
let step = "type";

let data = {
  type:"",
  zip:"",
  materials:[],
  budget:"",
  note:""
};

function render(){
  const app = document.getElementById("app");

  let html = "";

  if(step==="type"){
    html = `
      <h2>工事種別</h2>
      ${["新築","改修","相見積","その他"].map(v=>`
        <div class="card ${data.type===v?"selected":""}" onclick="setType('${v}')">${v}</div>
      `).join("")}
      <button onclick="go('zip')" ${!data.type?"disabled":""}>次へ</button>
    `;
  }

  if(step==="zip"){
    html = `
      <h2>郵便番号</h2>
      <input value="${data.zip}" oninput="update('zip',this.value)">
      <button onclick="go('material')" ${!data.zip?"disabled":""}>次へ</button>
    `;
  }

  if(step==="material"){
    html = `
      <h2>素材</h2>
      ${["漆喰","珪藻土","モルタル","モールテックス"].map(v=>`
        <div class="card ${data.materials.includes(v)?"selected":""}" onclick="toggle('${v}')">${v}</div>
      `).join("")}
      <button onclick="go('budget')" ${data.materials.length===0?"disabled":""}>次へ</button>
    `;
  }

  if(step==="budget"){
    html = `
      <h2>ご予算</h2>
      <input value="${data.budget}" oninput="update('budget',this.value)">
      <button onclick="go('note')" ${!data.budget?"disabled":""}>次へ</button>
    `;
  }

  if(step==="note"){
    html = `
      <h2>ご要望</h2>
      <textarea oninput="update('note',this.value)">${data.note}</textarea>
      <button onclick="go('result')">確認へ</button>
    `;
  }

  if(step==="result"){
    const text = generate();
    html = `
      <h2>確認</h2>
      <pre>${text}</pre>

      <button onclick="copy()">コピー</button>

      <a href="https://line.me/R/ti/p/@pwnk2010" target="_blank">
        <button>LINEで送る</button>
      </a>

      <button onclick="reset()">最初から</button>
    `;
  }

  // GSAP演出
  gsap.to("#app", {
    opacity:0,
    duration:0.2,
    onComplete:()=>{
      app.innerHTML = html;

      gsap.fromTo("#app",
        {opacity:0, y:20},
        {opacity:1, y:0, duration:0.5}
      );

      gsap.from(".card", {
        opacity:0,
        y:10,
        duration:0.4,
        stagger:0.05
      });
    }
  });
}

function go(s){ step=s; render(); }

function update(k,v){
  data[k]=v;
}

function setType(v){
  data.type=v;
  render();
}

function toggle(v){
  if(data.materials.includes(v)){
    data.materials=data.materials.filter(x=>x!==v);
  }else{
    data.materials.push(v);
  }
  render();
}

function generate(){
return `【PWNK ヒアリング】
工事種別：${data.type}
郵便番号：${data.zip}
素材：${data.materials.join("、")}
予算：${data.budget}
要望：${data.note}`;
}

function copy(){
  navigator.clipboard.writeText(generate());
  alert("コピーしました");
}

function reset(){
  location.reload();
}

render();
</script>

</body>
</html>
