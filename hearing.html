<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWNK ヒアリング</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  font-family:'Helvetica Neue','Noto Sans JP',sans-serif;
  color:#c8c8c8;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.container{
  width:100%;
  max-width:480px;
  background:#141414;
  border:1px solid #222;
  border-radius:6px;
  padding:2rem;
}
button{
  cursor:pointer;
}
.card{
  background:#1a1a1a;
  border:1px solid #333;
  padding:1rem;
  margin-bottom:0.5rem;
}
.card.selected{
  background:#2a2a2a;
  border:1px solid #c8c8c8;
}
input, textarea{
  width:100%;
  padding:10px;
  background:#111;
  border:1px solid #333;
  color:#fff;
}
.next{
  margin-top:20px;
  padding:10px;
  background:#c8c8c8;
  color:#000;
  border:none;
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>
let step = "start";

let data = {
  type:"",
  zip:"",
  materials:[],
  budget:"",
};

function render(){
  const app = document.getElementById("app");

  if(step==="start"){
    app.innerHTML = `
      <h2>ヒアリング開始</h2>
      <button onclick="go('type')">スタート</button>
    `;
  }

  if(step==="type"){
    app.innerHTML = `
      <h3>工事種別</h3>
      ${["新築","改修","相見積","その他"].map(v=>`
        <div class="card ${data.type===v?"selected":""}" onclick="setType('${v}')">${v}</div>
      `).join("")}
      <button class="next" onclick="go('zip')" ${!data.type?"disabled":""}>次へ</button>
    `;
  }

  if(step==="zip"){
    app.innerHTML = `
      <h3>郵便番号</h3>
      <input value="${data.zip}" oninput="data.zip=this.value">
      <button class="next" onclick="go('material')" ${!data.zip?"disabled":""}>次へ</button>
    `;
  }

  if(step==="material"){
    app.innerHTML = `
      <h3>素材</h3>
      ${["漆喰","珪藻土","モルタル"].map(v=>`
        <div class="card ${data.materials.includes(v)?"selected":""}" onclick="toggle('${v}')">${v}</div>
      `).join("")}
      <button class="next" onclick="go('budget')" ${data.materials.length===0?"disabled":""}>次へ</button>
    `;
  }

  if(step==="budget"){
    app.innerHTML = `
      <h3>予算</h3>
      <input value="${data.budget}" oninput="data.budget=this.value">
      <button class="next" onclick="go('result')" ${!data.budget?"disabled":""}>次へ</button>
    `;
  }

  if(step==="result"){
    const text = `
【PWNK ヒアリング】
工事種別：${data.type}
郵便番号：${data.zip}
素材：${data.materials.join("、")}
予算：${data.budget}
`;

    app.innerHTML = `
      <h3>確認</h3>
      <pre>${text}</pre>
      <button onclick="copyText()">コピー</button>
      <br><br>
      <a href="https://line.me/R/ti/p/@pwnk2010" target="_blank">
        LINEで送る
      </a>
    `;
  }
}

function go(s){
  step = s;
  render();
}

function setType(v){
  data.type = v;
  render();
}

function toggle(v){
  if(data.materials.includes(v)){
    data.materials = data.materials.filter(x=>x!==v);
  }else{
    data.materials.push(v);
  }
  render();
}

function copyText(){
  const text = document.querySelector("pre").innerText;
  navigator.clipboard.writeText(text);
  alert("コピーしました");
}

render();
</script>

</body>
</html>
